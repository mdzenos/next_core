services:
  nextjs-prod:
    image: mdzenos/nextjs-core:1.1
    container_name: nextjs-prod
    ports:
      - '${NEXT_PUBLIC_API_PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod
  nextjs-dev:
    image: mdzenos/nextjs-core:1.1-dev
    container_name: nextjs-dev
    working_dir: /app
    ports:
      - '${NEXT_PUBLIC_API_PORT:-3001}:3000'
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"
    restart: unless-stopped
    profiles:
      - dev
volumes:
  node_modules: {}

